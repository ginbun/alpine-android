name: Android Node SDK Image

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    paths:
      - docker/mobile-builder.Dockerfile
      - .github/workflows/mobile-builder.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ginbun/android-node-sdk
  TAG: android-36-jdk17-node24-pnpm10-ndk27-cmake3305-arm64
  # legacy alias — same image, old pull URL
  LEGACY_IMAGE: ghcr.io/ginbun/mobile-builder-android-node
  LEGACY_TAG: android-36-jdk17-node24-pnpm10

jobs:
  build:
    name: Build android-node-sdk
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        run: |
          tags="${IMAGE}:${TAG},${LEGACY_IMAGE}:${LEGACY_TAG}"
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            tags="${tags},${IMAGE}:latest,${LEGACY_IMAGE}:latest"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tags="${tags},${IMAGE}:${TAG}-${GITHUB_REF#refs/tags/}"
            tags="${tags},${LEGACY_IMAGE}:${LEGACY_TAG}-${GITHUB_REF#refs/tags/}"
          fi
          echo "tags=${tags}" >> "${GITHUB_OUTPUT}"

      - uses: docker/build-push-action@v6
        with:
          context: ./docker
          file: ./docker/mobile-builder.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
